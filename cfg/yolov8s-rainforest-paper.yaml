# Rainforest-YOLO paper-faithful architecture (as close as possible to ICCIP 2024 Figure 1)
# Paper baseline: YOLOv8s
# Changes enforced here:
#   1) All C2f -> C2f_AdaConv
#   2) Insert 1 x MSCB between Dark4 and Dark5
#   3) Insert 4 x PAM in neck/head path
#   4) Insert 3 x RST before three detection branches
# Note: exact hidden dims inside custom modules still depend on your local ultralytics_rainforest implementation.

nc: 1
scale: s
scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 3, C2f_AdaConv, [128, True]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 6, C2f_AdaConv, [256, True]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 6, C2f_AdaConv, [512, True]]
  - [-1, 1, MSCB, [512]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 3, C2f_AdaConv, [1024, True]]
  - [-1, 1, SPPF, [1024, 5]]

head:
  - [-1, 1, nn.Upsample, [None, 2, nearest]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [512]]
  - [-1, 1, PAM, [512]]

  - [-1, 1, nn.Upsample, [None, 2, nearest]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [256]]
  - [-1, 1, PAM, [256]]
  - [-1, 1, RST, [256]]

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 14], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [512]]
  - [-1, 1, PAM, [512]]
  - [-1, 1, RST, [512]]

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [1024]]
  - [-1, 1, PAM, [1024]]
  - [-1, 1, RST, [1024]]

  - [[18, 23, 28], 1, Detect, [nc]]
