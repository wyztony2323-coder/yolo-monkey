# =============================================================================
# Ablation: yolov8s_ablate_rst_p5_only — AdaConv+MSCB+4×PAM，仅 P5 分支前 1×RST
# -----------------------------------------------------------------------------
# RST: 仅最后一支（1024 通道）后 1×RST；P3/P4 无 RST
# 目的: 验证 RST 是否只适合高层语义分支
# Detect 输入: [17, 21, 26] — P3/P4 取 PAM 输出，P5 取 RST 输出（build 已校验）
# =============================================================================
nc: 1
scale: s
scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 3, C2f_AdaConv, [128, True]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 6, C2f_AdaConv, [256, True]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 6, C2f_AdaConv, [512, True]]
  - [-1, 1, MSCB, [512]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 3, C2f_AdaConv, [1024, True]]
  - [-1, 1, SPPF, [1024, 5]]

head:
  - [-1, 1, nn.Upsample, [None, 2, nearest]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [512]]
  - [-1, 1, PAM, [512]]

  - [-1, 1, nn.Upsample, [None, 2, nearest]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [256]]
  - [-1, 1, PAM, [256]]

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 14], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [512]]
  - [-1, 1, PAM, [512]]

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 3, C2f_AdaConv, [1024]]
  - [-1, 1, PAM, [1024]]
  - [-1, 1, RST, [1024]]

  - [[17, 21, 26], 1, Detect, [nc]]
